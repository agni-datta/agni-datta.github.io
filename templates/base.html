<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block title %}{{ data.site.title }}{% endblock title %}</title>
  <meta name="description" content="{{ data.site.description }}">
  <link rel="canonical" href="{{ data.site.base_url }}{% block canonical_path %}/{% endblock canonical_path %}">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <link rel="stylesheet" href="/assets/css/site.css">
  <script type="module">
    import init from "/assets/wasm/agni_datta_site_wasm.js";
    init();
  </script>
</head>

<body>
  <header class="site-header" role="banner">
    <a class="wordmark" href="/" data-route="home">{{ data.person.name }}</a>
    <div class="header-actions">
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/" data-route="home">Home</a>
        <a href="/publications/" data-route="publications">Publications</a>
        <a href="/notes/" data-route="notes">Notes</a>
        <a href="/resources/" data-route="resources">References</a>
      </nav>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" aria-pressed="false">
        <svg data-icon="sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <line x1="12" y1="2" x2="12" y2="6" />
          <line x1="12" y1="18" x2="12" y2="22" />
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
          <line x1="2" y1="12" x2="6" y2="12" />
          <line x1="18" y1="12" x2="22" y2="12" />
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
        </svg>
        <svg data-icon="moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
  </header>

  <main id="content">
    {% block content %}{% endblock content %}
  </main>

  <footer class="site-footer">
    <span><span class="footer-mark">©</span> {{ build.year }} {{ data.person.name }}</span>
  </footer>

</body>

</html>
