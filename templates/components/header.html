<header class="site-header">
  <button
    class="drawer-toggle"
    type="button"
    data-drawer-toggle
    aria-controls="primary-nav"
    aria-expanded="false"
    aria-label="Open navigation"
  >
    <svg
      data-icon="menu"
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="4" y1="6" x2="20" y2="6" />
      <line x1="4" y1="12" x2="20" y2="12" />
      <line x1="4" y1="18" x2="20" y2="18" />
    </svg>
    <svg
      data-icon="close"
      xmlns="http://www.w3.org/2000/svg"
      width="18"
      height="18"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  </button>
  <a class="wordmark" href="/" data-route="home">{{ data.person.name }}</a>
  <div class="header-actions">
    <nav class="site-nav" id="primary-nav" aria-label="Primary navigation">
      <a href="/" data-route="home" aria-current="{{ current_home }}">Home</a>
      <a href="/publications/" data-route="publications" aria-current="{{ current_publications }}">Publications</a>
      <a href="/notes/" data-route="notes" aria-current="{{ current_notes }}">Notes</a>
      <a href="/resources/" data-route="resources" aria-current="{{ current_resources }}">References</a>
      <a href="/miscellany/" data-route="miscellany" aria-current="{{ current_miscellany }}">Miscellany</a>
    </nav>
    <button
      class="theme-toggle"
      type="button"
      data-theme-toggle
      title="Toggle color theme"
      aria-label="Switch to light theme"
      aria-pressed="true"
    >
      <svg
        data-icon="sun"
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="4" />
        <line x1="12" y1="2" x2="12" y2="6" />
        <line x1="12" y1="18" x2="12" y2="22" />
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76" />
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07" />
        <line x1="2" y1="12" x2="6" y2="12" />
        <line x1="18" y1="12" x2="22" y2="12" />
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24" />
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93" />
      </svg>
      <svg
        data-icon="moon"
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </div>
</header>
<button class="drawer-backdrop" type="button" data-drawer-backdrop aria-label="Close navigation"></button>
