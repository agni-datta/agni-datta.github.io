note = "Luca Trevisan on complexity, pseudorandomness, and combinatorics."

[[sections.items]]
label = "Goldreich — My Choices"
url = "https://www.wisdom.weizmann.ac.il/~oded/my-choice.html"
note = "Goldreich's curated reading list."

