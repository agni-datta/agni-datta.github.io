[about]
intro = """
I will be joining the [Security and Privacy Group](https://web.inf.ed.ac.uk/security-privacy) at the [School of Informatics](https://www.ed.ac.uk/informatics), [University of Edinburgh](https://www.ed.ac.uk/), as a PhD student starting Fall 2026. I am excited to be advised by [Damiano Abram](https://damianoabram.github.io/) and [Rahul Santhanam](https://www.cs.ox.ac.uk/people/rahul.santhanam/).

Previously, I worked as a predoctoral researcher at the [Trust Lab](https://trustlab.iitb.ac.in/), [IIT Bombay](https://www.iitb.ac.in/), and [CISPA](https://cispa.de/en). I completed my integrated Master's degree at [VIT Bhopal University](https://vitbhopal.ac.in/), where my thesis was supervised by [Matteo Campanelli](https://binarywhales.com/).
"""
