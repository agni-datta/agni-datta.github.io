[about]
intro = """
I am a PhD student in the [Security and Privacy Group](https://web.inf.ed.ac.uk/security-privacy) at the [School of Informatics](https://www.ed.ac.uk/informatics), [University of Edinburgh](https://www.ed.ac.uk/), supervised by [Damiano Abram](https://damianoabram.github.io/) and [Rahul Santhanam](https://www.cs.ox.ac.uk/people/rahul.santhanam/) (University of Oxford). Previously, I was a predoctoral researcher at the [Trust Lab](https://trustlab.iitb.ac.in/), [IIT Bombay](https://www.iitb.ac.in/) and [CISPA](https://cispa.de/en). I completed my integrated Master's at [VIT Bhopal University](https://vitbhopal.ac.in/), where I wrote my thesis under the supervision of [Matteo Campanelli](https://binarywhales.com/).
"""
interests_text = """
I am interested in theoretical computer science at large and especially in cryptography and complexity theory.
"""
interests = [
  "Foundations of Cryptography",
  "Computational Complexity",
  "Probabilistic Proof Systems",
  "Program Obfuscation",
  "Metacomplexity",
]

